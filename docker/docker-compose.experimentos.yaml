      - .env
    profiles:
      - experimento
  experimento-avanco-04:
    build:
      context: ../python/experimentos
    command: ["python", "experimento_04.py"]
    volumes:
      - ./nginx/data:/data
    env_file:
      - .env
    profiles:
      - experimento
  experimento-avanco-05:
    build:
      context: ../python/experimentos
    command: ["python", "experimento_05.py"]
    volumes:
      - ./nginx/data:/data
    env_file:
      - .env
