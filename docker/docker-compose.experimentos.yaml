name: dnit-ortho-check

services:
  experimento-avanco:
    build:
      context: ../python/experimentos
    volumes:
      - ./nginx/data:/data:ro
    env_file:
      - .env
    profiles:
      - experimento
  experimento-avanco-02:
    build:
      context: ../python/experimentos
    command: ["python", "comparar_avanco_02.py"]
