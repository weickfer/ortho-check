server {
    listen 80;
    server_name localhost;

    location /tiles/ {
        alias /usr/share/nginx/html/tiles/;
        
        # Liberação de CORS para requisições do React
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
        
        # Desativa a listagem de arquivos por segurança
        autoindex off; 
    }

    location /images/ {
        alias /usr/share/nginx/data/outputs/;
        
        # Liberação de CORS para requisições do React
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
        
        # Ativa a listagem de arquivos
        autoindex on; 
    }
}